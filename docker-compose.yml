services:
  vectordb:
    build: .
    container_name: magnitude-vectordb
    ports:
      - "8080:8080"                  # HTTP API (configure TLS in config.yaml for HTTPS)
      - "127.0.0.1:9090:9090"       # Metrics + pprof (localhost only)
    volumes:
      - vectordb-data:/app/data
      - ./certs:/app/certs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vectordb-data:
    driver: local
